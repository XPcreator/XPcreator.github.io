<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom, #000000, #8b0000);
            overflow: hidden;
        }

        /* Our Red Box Button */
        .red-box {
            width: 100px;         /* Equal width... */
            height: 100px;        /* ...and height makes a square */
            background-color: #ff0000;
            border: 4px solid #660000; /* A darker red border for depth */
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); /* A slight red glow */
        }

        .red-box:active {
            transform: scale(0.9); /* Shrinks slightly when clicked */
            background-color: #d00000;
        }
    </style>
</head>
<body>

    <button class="red-box" onclick="boxClicked()"></button>

    <script>
        function boxClicked() {
            console.log("The red box was clicked!");
            // We can add more logic here later!
        }
    </script>

</body>
</html>
