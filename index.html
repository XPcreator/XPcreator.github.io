<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 40px; 
            height: 100vh;
            background: linear-gradient(to bottom, #000000, #8b0000);
            overflow: hidden;
            display: flex;
            align-items: flex-start; 
            justify-content: flex-start;
        }

        .red-box {
            width: 320px;
            height: 320px;
            background-color: #ff0000;
            border: 6px solid #660000;
            border-radius: 30px;
            
            cursor: pointer;
            outline: none;

            /* This makes the growing and glowing look smooth, not jumpy */
            transition: all 0.3s ease; 
            
            /* The default shadow (very subtle) */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        /* --- THE MOUSE OVER EFFECT --- */
        .red-box:hover {
            transform: scale(1.05); /* Increases size by 5% */
            background-color: #ff1a1a; /* Brightens the red slightly */
            
            /* The cool light effect: A big, bright red glow */
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.8); 
        }

        /* --- THE CLICK EFFECT --- */
        .red-box:active {
            transform: scale(0.95); /* Shrinks when you press down */
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
        }
    </style>
</head>
<body>

    <button class="red-box" onclick="boxClicked()"></button>

    <script>
        function boxClicked() {
            console.log("You clicked the glowing pack!");
        }
    </script>

</body>
</html>
