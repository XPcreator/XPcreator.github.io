<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 40px; 
            height: 100vh;
            background: linear-gradient(to bottom, #000000, #8b0000);
            overflow: hidden;
            display: flex;
            align-items: flex-start; 
            justify-content: flex-start;
        }

        /* The Original Red Box - Now Bigger */
        .red-box {
            width: 320px;         /* Big Market Size */
            height: 320px;        /* Big Market Size */
            background-color: #ff0000;
            border: 6px solid #660000;
            border-radius: 30px;  /* Nice rounded corners */
            
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            outline: none;
        }

        .red-box:active {
            transform: scale(0.95);
            background-color: #d00000;
        }
    </style>
</head>
<body>

    <button class="red-box" onclick="boxClicked()"></button>

    <script>
        function boxClicked() {
            console.log("The Big Red Pack was clicked!");
        }
    </script>

</body>
</html>
