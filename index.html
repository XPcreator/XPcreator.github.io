<!DOCTYPE html>
<html>
<head>
    <title>My Cool Game Site</title>
    <style>
        /* This is CSS: Making it look nice */
        body { background: #222; color: white; text-align: center; font-family: sans-serif; }
        #game-box { width: 300px; height: 300px; border: 2px solid gold; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 50px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Welcome to My Games</h1>
    <p>Click the box to score!</p>
    <div id="game-box">0</div>

    <script>
        // This is JavaScript: Making it work
        let score = 0;
        const box = document.getElementById('game-box');
        
        box.onclick = function() {
            score = score + 1;
            box.innerText = score;
            if(score === 10) {
                alert("You reached 10! You're a pro.");
            }
        };
    </script>
</body>
</html>
