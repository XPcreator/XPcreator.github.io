<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #4b2ea3; color: white; font-family: 'Arial', sans-serif; text-align: center; }
        .game-card { background: white; color: #333; width: 400px; margin: 50px auto; padding: 20px; border-radius: 15px; box-shadow: 0 10px 0 #333; }
        .btn { background: #0bc2cf; border: none; padding: 15px 30px; color: white; border-radius: 10px; cursor: pointer; font-size: 18px; margin: 5px; transition: 0.2s; }
        .btn:hover { transform: scale(1.1); background: #0db3bf; }
        #gold-count { font-size: 30px; color: gold; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

    <h1>MY REMIX GAME</h1>
    <div id="gold-count">Gold: 0</div>

    <div class="game-card">
        <h2 id="question">What is 5 + 5?</h2>
        <div id="answers">
            <button class="btn" onclick="checkAnswer(true)">10</button>
            <button class="btn" onclick="checkAnswer(false)">12</button>
        </div>
    </div>

    <script>
        let gold = 0;

        function checkAnswer(isCorrect) {
            if (isCorrect) {
                gold += 100;
                alert("Correct! +100 Gold");
            } else {
                alert("Wrong! Try again.");
            }
            document.getElementById('gold-count').innerText = "Gold: " + gold;
        }
    </script>
</body>
</html>
