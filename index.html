<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 30px; /* Increased padding for the larger box */
            height: 100vh;
            background: linear-gradient(to bottom, #000000, #8b0000);
            overflow: hidden;
        }

        /* The Pack Button */
        .pack-button {
            width: 200px;         /* Larger size */
            height: 200px;        /* Larger size */
            background-color: #ff0000;
            border: 6px solid #660000; /* Thicker border for the bigger box */
            border-radius: 35px;  /* Smoother round corners */
            
            cursor: pointer;
            transition: all 0.2s ease; /* Makes animations smooth */
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            outline: none;
            
            /* Center the text/icon if we add one later */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Effect when you hover over the pack */
        .pack-button:hover {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.8);
            background-color: #ff1a1a;
        }

        /* Effect when you actually click it */
        .pack-button:active {
            transform: scale(0.9);
            background-color: #b30000;
        }
    </style>
</head>
<body>

    <button class="pack-button" onclick="openPack()"></button>

    <script>
        function openPack() {
            console.log("Pack Opening animation starts here!");
            // Later, we can add code here to make a Blook pop out!
        }
    </script>

</body>
</html>
