<!DOCTYPE html>
<html>
<head>
    <title>My Remix Game</title>
    <style>
        /* This creates your Black and Red Gradient */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Gradient: Starts black at top, turns dark red at bottom */
            background: linear-gradient(to bottom, #000000, #8b0000);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Keeps the screen from scrolling */
        }

        #game-container {
            text-align: center;
        }

        .main-button {
            padding: 20px 40px;
            font-size: 24px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px #660000;
            transition: 0.1s;
        }

        .main-button:active {
            box-shadow: 0 2px #660000;
            transform: translateY(3px);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>THE REMIX</h1>
        <p>Score: <span id="score-val">0</span></p>
        <button class="main-button" onclick="addPoint()">TAP TO START</button>
    </div>

    <script>
        let score = 0;
        const scoreDisplay = document.getElementById('score-val');

        function addPoint() {
            score++;
            scoreDisplay.innerText = score;
        }
    </script>

</body>
</html>
