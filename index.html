<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 40px; 
            height: 100vh;
            background: linear-gradient(to bottom, #000000, #8b0000);
            overflow: hidden;
            display: flex;
            align-items: flex-start; /* Keeps it at the top */
            justify-content: flex-start; /* Keeps it at the left */
        }

        /* The Main Pack Container */
        .pack-card {
            width: 320px;         /* Match the scale of the Blooket market boxes */
            height: 320px;        
            background-color: #ff0000;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            position: relative;    /* Allows us to put the blue bar inside it */
            overflow: hidden;      /* Clips the blue bar so it follows the round corners */
            box-shadow: 0 12px 0 rgba(0,0,0,0.3); /* Adds that 'thick' bottom depth */
            transition: transform 0.1s, box-shadow 0.1s;
            outline: none;
            padding: 0;
        }

        /* The Blue Bar at the bottom (like the '25 tokens' bar) */
        .pack-bottom-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
            background-color: #3a81e0; /* That classic Blooket blue */
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 4px solid rgba(0,0,0,0.1);
        }

        /* Interaction Effects */
        .pack-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 17px 0 rgba(0,0,0,0.2);
        }

        .pack-card:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <button class="pack-card" onclick="openPack()">
        <div class="pack-bottom-bar">
            </div>
    </button>

    <script>
        function openPack() {
            console.log("Opening the red pack...");
        }
    </script>

</body>
</html>
