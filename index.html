<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 20px; /* This acts as a 'buffer' so the box isn't touching the very edge */
            height: 100vh;
            background: linear-gradient(to bottom, #000000, #8b0000);
            overflow: hidden;
            /* Removed the "center" commands so the box goes to the top left by default */
        }

        .red-box {
            width: 150px;         /* Made it bigger (was 100px) */
            height: 150px;        /* Made it bigger (was 100px) */
            background-color: #ff0000;
            border: 4px solid #660000;
            
            /* Round Corners */
            border-radius: 25px;  /* Higher number = more round */
            
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            outline: none;        /* Removes the default blue focus ring */
        }

        .red-box:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <button class="red-box" onclick="boxClicked()"></button>

    <script>
        function boxClicked() {
            console.log("Corner box clicked!");
        }
    </script>

</body>
</html>
