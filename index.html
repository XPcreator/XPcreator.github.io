<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 50px; 
            height: 100vh;
            background: linear-gradient(to bottom, #000000, #8b0000);
            overflow: hidden;
            display: flex;
            flex-direction: column; /* Stacks the text on top of the box */
            align-items: flex-start; 
            justify-content: flex-start;
            font-family: 'Arial Black', Gadget, sans-serif; /* Thick, game-style font */
        }

        /* The "Market" Header Text */
        .market-title {
            color: white;
            font-size: 70px;      /* Big and bold like the screenshot */
            margin-bottom: 30px;  /* Space between text and the pack */
            margin-top: 0;
            text-shadow: 4px 4px 0px rgba(0,0,0,0.3); /* Gives it that 3D look */
        }

        .red-box {
            width: 320px;
            height: 320px;
            background-color: #ff0000;
            border: 6px solid #660000;
            border-radius: 30px;
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease; 
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        /* Mouse over effect */
        .red-box:hover {
            transform: scale(1.05);
            background-color: #ff1a1a;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.8); 
        }

        /* Click effect */
        .red-box:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <h1 class="market-title">Market</h1>

    <button class="red-box" onclick="boxClicked()"></button>

    <script>
        function boxClicked() {
            console.log("Opening pack from the market!");
        }
    </script>

</body>
</html>
